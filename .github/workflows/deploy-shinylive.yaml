name: Deploy Shiny app with shinylive

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install app and export dependencies
        run: |
          Rscript -e 'install.packages(c("shiny", "bslib", "DT", "ggplot2", "dplyr", "tidyr", "openxlsx", "jsonlite", "htmltools", "scales", "rpart", "MASS", "lme4", "lmerTest", "performance", "shinylive"))'

      - name: Export shinylive site
        run: Rscript tools/export-shinylive.R

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: shinylive

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
